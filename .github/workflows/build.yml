name: Build Sentinel Archive Windows Installer

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: Custom version
        required: false
        default: ''

env:
  VERSION: ${{ github.event.inputs.version || '1.0.0-beta' }}
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          $version = "${{ github.ref }}" -replace 'refs/tags/v', ''
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install -r requirements-dev.txt
          python -m pip install pyinstaller

      - name: Install frontend dependencies
        run: npm ci

      - name: Run tests
        run: python -m unittest discover -s tests -p "*static.py" -v

      - name: Build control panel
        run: |
          Remove-Item frontend-dist -Recurse -Force -ErrorAction SilentlyContinue
          npm run build
          Move-Item dist frontend-dist

      - name: Build executable
        run: |
          Remove-Item build -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item dist -Recurse -Force -ErrorAction SilentlyContinue
          python -m PyInstaller `
            --clean `
            --name SentinelArchive `
            --onedir `
            --console `
            --hidden-import uvicorn `
            --hidden-import aiosqlite `
            --hidden-import discord `
            --hidden-import yfinance `
            --hidden-import pandas `
            --hidden-import numpy `
            --hidden-import multipart `
            --collect-all discord `
            --collect-all yfinance `
            --noconfirm `
            windows_entrypoint.py

      - name: Copy app assets into package
        run: |
          $package = "dist\SentinelArchive"
          Copy-Item "frontend-dist" -Destination "$package\dist" -Recurse -Force
          Copy-Item "Launch-Sentinel-Archive.bat" -Destination $package -Force
          Copy-Item "Launch-Sentinel-Archive.ps1" -Destination $package -Force

      - name: Verify package
        run: |
          if (!(Test-Path "dist\SentinelArchive\SentinelArchive.exe")) {
            Write-Host "ERROR: SentinelArchive.exe not found"
            exit 1
          }
          if (!(Test-Path "dist\SentinelArchive\dist\index.html")) {
            Write-Host "ERROR: packaged dist\index.html not found"
            exit 1
          }
          if (!(Test-Path "dist\SentinelArchive\Launch-Sentinel-Archive.bat")) {
            Write-Host "ERROR: Launch-Sentinel-Archive.bat not found"
            exit 1
          }
          if (!(Test-Path "dist\SentinelArchive\Launch-Sentinel-Archive.ps1")) {
            Write-Host "ERROR: Launch-Sentinel-Archive.ps1 not found"
            exit 1
          }

      - name: Create Inno Setup script
        run: |
          $iss = @"
          #define MyAppName "Sentinel Archive"
          #define MyAppVersion "${{ env.VERSION }}"
          #define MyAppPublisher "Tetradim / SignalForge Lab"
          #define MyAppURL "https://github.com/Tetradim/Sentinel-Archive"
          #define MyAppExeName "SentinelArchive.exe"

          [Setup]
          AppId={{D6C26C49-9905-4017-A251-712D99FA8F27}
          AppName={#MyAppName}
          AppVersion={#MyAppVersion}
          AppVerName={#MyAppName} {#MyAppVersion}
          AppPublisher={#MyAppPublisher}
          AppPublisherURL={#MyAppURL}
          AppSupportURL={#MyAppURL}/issues
          AppUpdatesURL={#MyAppURL}/releases
          DefaultDirName={autopf}\{#MyAppName}
          DefaultGroupName={#MyAppName}
          OutputDir=installer-dist
          OutputBaseFilename=SentinelArchive-Setup-{#MyAppVersion}
          UninstallDisplayName={#MyAppName}
          UninstallDisplayIcon={app}\{#MyAppExeName}
          Compression=lzma2
          SolidCompression=yes
          WizardStyle=modern
          MinVersion=10.0.18362
          PrivilegesRequired=admin
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible

          [Languages]
          Name: "english"; MessagesFile: "compiler:Default.isl"

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: checkedonce
          Name: "launchapp"; Description: "Launch Sentinel Archive after install"; GroupDescription: "Startup"; Flags: checkedonce

          [Files]
          Source: "dist\SentinelArchive\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\{#MyAppName}"; Filename: "{app}\Launch-Sentinel-Archive.bat"; WorkingDir: "{app}"
          Name: "{group}\Uninstall {#MyAppName}"; Filename: "{uninstallexe}"
          Name: "{commondesktop}\{#MyAppName}"; Filename: "{app}\Launch-Sentinel-Archive.bat"; WorkingDir: "{app}"; Tasks: desktopicon

          [Run]
          Filename: "{app}\Launch-Sentinel-Archive.bat"; Description: "Launch {#MyAppName}"; Flags: nowait postinstall skipifsilent shellexec; Tasks: launchapp; WorkingDir: "{app}"

          [UninstallDelete]
          Type: filesandordirs; Name: "{app}"
          Type: files; Name: "{userdesktop}\Sentinel-Archive.log"

          [Code]
          procedure CurUninstallStepChanged(CurUninstallStep: TUninstallStep);
          var
            ResultCode: Integer;
          begin
            if CurUninstallStep = usUninstall then
            begin
              Exec('taskkill', '/F /IM SentinelArchive.exe', '', SW_HIDE, ewWaitUntilTerminated, ResultCode);
            end;
          end;
          "@
          $iss | Out-File -Encoding ASCII setup.iss

      - name: Build installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: setup.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SentinelArchive-Setup-${{ env.VERSION }}
          path: installer-dist/SentinelArchive-Setup*.exe
          if-no-files-found: error
          retention-days: 90

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    steps:
      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          pattern: SentinelArchive-Setup-*
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/SentinelArchive-Setup*.exe
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') }}
          generate_release_notes: true
